- name: redis installation book
  hosts: redis
  become: yes
  tasks:
  - name: enable dnmf redis 7
    ansible.builtin.command:  dnf module enable redis:7 -y
  - name: install redis using dnf
    ansible.builtin.dnf:
      name: redis
      state: present
  - name: update the line address and prottected mode
    ansible.builtin.replace:
      path: /etc/redis/redis.conf
      regexp: "127.0.0.1"
      replace: "0.0.0.0"
  - name: update the line address and prottected mode
    ansible.builtin.lineinfile:
      path: /etc/redis/redis.conf
      regexp: "protected-mode"
      line: "protected-mode no"
  - name: state and enable
    ansible.builtin.systemd:
      name: redis
      status: restarted
      enabled: yes
  
  

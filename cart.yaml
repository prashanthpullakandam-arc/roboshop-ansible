- name: ansible playbook to install cart
  hosts: cart
  become: yes
  tasks:
  - name: enable dnf
    ansible.builtin.command:  dnf module enable nodejs:20 -y
  - name: install the dnf
    ansible.builtin.dnf:
      name: nodejs
      state: present
  - name: add the user
    ansible.builtin.user:
      name: roboshop
      system: yes
      shell: /sbin/nologin
      home: /app
      comment: "roboshop system user"
  - name: delete the directory
    ansible.builtin.file:
      path: /app
      state: absent
  - name: create the directory
    ansible.builtin.file:
      path: /app
      state: directory
  - name: delete the file
    ansible.builtin.file:
      path: /tmp/cart.zip
      state: absent
  - name: download the file from url
    ansible.builtin.get_url:
      url: "https://roboshop-artifacts.s3.amazonaws.com/cart-v3.zip"
      dest: /tmp/cart.zip
  - name: urarcive the file
    ansible.builtin.unarchive:
      src: /tmp/cart.zip
      dest: /app
      remote_src: yes
  - name: install npm
    community.general.npm:
      path: /app
  - name: copy the file
    ansible.builtin.template:
     src: /home/ec2-user/roboshop-ansible/cart.service  
     dest: /etc/systemd/system/cart.service
  - name: restart the service
    ansible.builtin.systemd:
      name: cart
      state: restarted
      enabled: yes
      daemon_reload: yes

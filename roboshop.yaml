- name: create ec2 route 53 record
  hosts: all
  connection: local
  vars:
    secgrpid: "sg-084020e387d413aac"
    amid: "ami-0220d79f3f480ecf5"
    instances:
    - mongodb
    - catalogue
    envmnt: "dev"
    domanina: "ananthsolutions.online"
  tasks:
  - name: create ec2 instances
    amazon.aws.ec2_instance:
      instance_type: t3.micro
      security_group: "{{ secgrpid }}"
      image_id: "{{ amid }}"
      name: "{{ envmnt }}-{{ item }}"
      tags:
        project:  robishop
        component: "{{ item }}"
        Environment: "{{ envmnt }}-{{ item }}"
    loop: "{{ instances }}"
    register: ec2_output
  - name: print the output
    ansible.builtin.debug:
      msg: "{{ ec2_output }}"
  - name: create route 53 records
    amazon.aws.route53:
      state: present
      zone: "{{ domanina }}"
      record: "{{ item.item }}-{{ envmnt }}.{{ domanina }}"   ##mongo-dev.ananthsolutions.online
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      wait: true
    loop: "{{ ec2_output.results}}"
  - name: create route 53 records Frontend
    amazon.aws.route53:
      state: present
      zone: "{{ domanina }}"
      record: "{{ domanina }}"   ##mongo-dev.ananthsolutions.online
      type: A
      ttl: 1
      value: "{{ item.instances[0].public_ip_address }}"
      wait: true
    loop: "{{ ec2_output.results}}"
    when: item.item == "Frontend"
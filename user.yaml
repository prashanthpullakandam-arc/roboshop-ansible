- name: create user service installation
  hosts: user
  become: yes
  tasks:
  - name: enable nodejs 20
    ansible.builtin.command:  dnf module enable nodejs:20 -y
  - name: start node js using  dnf
    ansible.builtin.dnf:
      name: nodejs
      state:  present
  - name: create the user
    ansible.builtin.user:
      name: roboshop
      system: yes
      shell: /sbin/nologin
      home: /app
      comment: "roboshop system user"
  - name: delete the file
    ansible.builtin.file:
      path: /app
      state: absent
  - name: create the directory
    ansible.builtin.file:
      path: /app
      state: directory
  - name: delete the file
    ansible.builtin.file:
      path: /tmp/user.zip
      state: absent
  - name: download file with url
    ansible.builtin.get_url:
      url: "https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip"
      dest: /tmp/user.zip
  - name: unarchive the file
    ansible.builtin.unarchive:
      src: /tmp/user.zip
      dest: /app
      remote_src: yes 
  - name: install npm
    community.general.npm:
      path: /app
  - name: copy the file
    ansible.builtin.copy:
      src: /home/ec2-user/roboshop-ansible/user.service  
      dest: /etc/systemd/system/user.service
  - name: enable the system
    ansible.builtin.systemd:
      name: user
      state: restarted   
      enabled: yes
 
    


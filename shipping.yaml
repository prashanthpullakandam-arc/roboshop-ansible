- name: create the location for yaml
  hosts:  shipping
  become: yes
  tasks:
  - name: install items
    ansible.builtin.dnf:
      name: "{{ item }}"
      state: present
    loop:
    - maven
    - mysql
  - name: create user
    ansible.builtin.user:
      name: roboshop
      system: yes
      shell: /sbin/nologin
      home: /app
      comment: "roboshop system user"
  - name: remove the directory
    ansible.builtin.file:
      path: /app
      state: absent
  - name: add the directory
    ansible.builtin.file:
      path: /app
      state: direcotry
  - name: delete the downloaded file
    ansible.builtin.file:
      path: /tmp/shipping.zip
      status: absent   
  - name: download file
    ansible.builtin.get_url:
      url: "https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip"
      dest: /tmp/shipping.zip
  - name: unarchive file
    ansible.builtin.unarchive:
      src: /tmp/shipping.zip
      dest: /app
      remote_src: yes
  - name: install dependencies
    ansible.builtin.command: mvn clean package
    args:
      chdir: /app
  - name: install dependencies
    ansible.builtin.command: mv target/shipping-1.0.jar shipping.jar
    args:
      chdir: /app   

  - name: copy systrm ctl sertvie
    ansible.builtin.template:
      src: /home/ec2-user/roboshop-ansible/shipping.service
      dest: /etc/systemd/system/shipping.service    
  
  - name: import shipping data
    community.mysql.mysql_db:
      state: import
      name: all
      login_host: "{{ MYSQL_HOST }}"
      login_user: root
      login_password: RoboShop@1
      target: "{{ item }}"
    loop:
    - /app/db/schema.sql
    - /app/db/app-user.sql 
    - /app/db/master-data.sql
  
  - name: create system ctl service
    ansible.builtin.systemd:
      name: shipping
      status: restarted
      enabled: yes
      daemon_reload: yes


- name: Rabbit mq playbook 
  hosts: rabbitmq
  become: yes
  tasks:
  - name: copy rabbit mq repo to yum directory
    ansible.builtin.copy:
      src:  rabbitmq.repo
      dest: /etc/yum.repos.d/rabbitmq.repo  
  - name: install rabbitmq
    ansible.builtin.dnf:
      name: rabbitmq-server
      state: present
  - name: enable and start rabbitmq
    ansible.builtin.systemd:
      name: rabbitmq-server
      state: present
      enabled: yes
  - name: enable the user
    community.rabbitmq.rabbitmq_user:
      user: roboshop 
      password: roboshop123
      permissions:
        - vhost: /
          configure_priv: .*
          read_priv: .*
          write_priv: .*
      state: present
- name: catalogue deployment
  hosts:  catalogue 
  become: yes
  tasks:
  - name: enable nodejs 20
    ansible.builtin.command:  dnf module enable nodejs:20
  - name: dnf install 
    ansible.builtin.dnf:
      name: nodejs
      state: present
  - name: create user
    ansible.builtin.user:
      name: roboshop
      system: yes
      shell: /sbin/nologin
      home: /app
      comment: "roboshop system user"
  - name: create directory
    ansible.builtin.file:
      path: /app
      state: directory
  - name: download the application
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip  
      dest: /tmp/catalogue.zip
  - name: ansible unzip file
    ansible.builtin.unarchive:
      src:  /tmp/catalogue.zip
      dest: /app
      remote_src: yes
  - name: install npm
    community.general.npm:
      path: /app
  - name: copy the catalogue service file
    ansbile.builtin.copy:
      src: /home/ec2-user/roboshop-ansible/catalogue.service
      dest: /etc/systemd/system/catalogue.service
    ansible.builtin.systemd:
      name: catalogue
      state: present
      enable: yes
  - name: copy mongo repor
    ansible.builtin.copy:
      src: /home/ec2-user/roboshop-ansible/mongo.repo
      dest: /etc/yum.repos.d/mongo.repo
  - name: install mongodb
    ansible.builtin.dnf:
      name: mongodb-mongosh
      state: present
  - name: check if data exisit in mongodb
    ansible.builtin.command:  mongosh --host "{{ MONGODB_HOST }}" --quiet  --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
    register: mongooutput
  - name: load data
    ansible.builtin.shell: mongosh --host "{{ MONGODB_HOST }}" </app/db/master-data.js
    when: mongooutput.stdout | int < 0



